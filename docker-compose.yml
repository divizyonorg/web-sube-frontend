# ─────────────────────────────────────────────────────────
# WEB ŞUBE 2.0 — Docker Compose
#
# KULLANIM:
#   DEV     (local):    docker compose --profile dev up
#                       → http://localhost:5000
#
#   TEST    (sunucu):   docker compose --profile test up -d
#                       → sunucu:5001
#
#   PREPROD (sunucu):   docker compose --profile preprod up -d
#                       → sunucu:5002
# ─────────────────────────────────────────────────────────

services:

  # ══════════════════════════════════════════════════════
  # DEV — Geliştirici local makinesinde
  # Dockerfile'dan build edilir, mock OTP açık
  # ══════════════════════════════════════════════════════
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webshube-dev
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles: [dev]

  # ══════════════════════════════════════════════════════
  # TEST — Sunucuda, testerlar kullanır
  # GHCR registry'den image çekilir
  # ══════════════════════════════════════════════════════
  test:
    image: ${REGISTRY:-ghcr.io/divizyon}/webshube:${IMAGE_TAG:-test-latest}
    container_name: webshube-test
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Test
      - ASPNETCORE_URLS=http://+:8080
    env_file:
      - .env.Test
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles: [test]

  # ══════════════════════════════════════════════════════
  # PREPROD — Sunucuda, canlıya en yakın ortam
  # GHCR registry'den image çekilir, manuel onaylı deploy
  # ══════════════════════════════════════════════════════
  preprod:
    image: ${REGISTRY:-ghcr.io/divizyon}/webshube:${IMAGE_TAG:-preprod-latest}
    container_name: webshube-preprod
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=PreProd
      - ASPNETCORE_URLS=http://+:8080
    env_file:
      - .env.Preprod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles: [preprod]

