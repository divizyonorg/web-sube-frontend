name: CI/CD — Build & Deploy

# ─────────────────────────────────────────────────────────
# AKIŞ:
#   develop push  → CI (deploy yok)
#   staging push  → CI → Docker push → TEST deploy
#   preprod push  → CI → Docker push → PRE-PROD deploy (onaylı)
# ─────────────────────────────────────────────────────────

on:
  push:
    branches:
      - develop
      - staging
      - preprod

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: emirklc/webshube

jobs:

  # ══════════════════════════════════════════════════════
  # 1. CI — Her push'ta çalışır
  #    Başarısız olursa docker ve deploy başlamaz
  # ══════════════════════════════════════════════════════
  ci:
    name: CI — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: .NET 8 kur
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  # ══════════════════════════════════════════════════════
  # 2. DOCKER — CI geçtikten sonra
  #    Sadece staging ve preprod'da çalışır
  # ══════════════════════════════════════════════════════
  docker:
    name: Docker Build & Push
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/preprod'
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      latest_tag: ${{ steps.meta.outputs.latest_tag }}

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Docker Buildx kur
        uses: docker/setup-buildx-action@v3

      - name: GHCR'ye login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tag belirle
        id: meta
        run: |
          if [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            echo "tag=test-${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "latest_tag=test-latest" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/preprod" ]; then
            echo "tag=preprod-${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "latest_tag=preprod-latest" >> $GITHUB_OUTPUT
          fi

      - name: Docker image build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════════════
  # 3. TEST DEPLOY — staging branch
  # ══════════════════════════════════════════════════════
  deploy-test:
    name: Deploy → TEST
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    environment:
      name: test
      url: http://${{ secrets.SERVER_IP }}:5001

    steps:
      - name: Sunucuya deploy et
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd /app/webshube

            echo "→ Compose dosyasını güncelle"
            git fetch origin staging
            git checkout staging
            git pull origin staging

            echo "→ GHCR login"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u ${{ secrets.GHCR_USER }} --password-stdin

            echo "→ Image çek"
            export REGISTRY=ghcr.io/emirklc
            export IMAGE_TAG=test-${{ github.sha }}
            docker compose --profile test pull

            echo "→ Container yeniden başlat"
            docker compose --profile test up -d --no-build

            echo "→ Healthcheck (max 60sn)"
            for i in {1..12}; do
              if curl -fs http://localhost:5001/health > /dev/null; then
                echo "✓ Sağlıklı"
                docker image prune -f
                exit 0
              fi
              echo "  [$i/12] bekleniyor..."
              sleep 5
            done

            echo "✗ Healthcheck başarısız — rollback"
            export IMAGE_TAG=test-latest
            docker compose --profile test up -d --no-build
            exit 1

  # ══════════════════════════════════════════════════════
  # 4. PRE-PROD DEPLOY — preprod branch
  #    GitHub Environment'ta required reviewers tanımlı olmalı
  # ══════════════════════════════════════════════════════
  deploy-preprod:
    name: Deploy → PRE-PROD
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/preprod'
    environment:
      name: preprod
      url: http://${{ secrets.SERVER_IP }}:5002

    steps:
      - name: Sunucuya deploy et
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd /app/webshube

            echo "→ Compose dosyasını güncelle"
            git fetch origin preprod
            git checkout preprod
            git pull origin preprod

            echo "→ GHCR login"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u ${{ secrets.GHCR_USER }} --password-stdin

            echo "→ Image çek"
            export REGISTRY=ghcr.io/emirklc
            export IMAGE_TAG=preprod-${{ github.sha }}
            docker compose --profile preprod pull

            echo "→ Container yeniden başlat"
            docker compose --profile preprod up -d --no-build

            echo "→ Healthcheck (max 60sn)"
            for i in {1..12}; do
              if curl -fs http://localhost:5002/health > /dev/null; then
                echo "✓ Sağlıklı"
                docker image prune -f
                exit 0
              fi
              echo "  [$i/12] bekleniyor..."
              sleep 5
            done

            echo "✗ Healthcheck başarısız — rollback"
            export IMAGE_TAG=preprod-latest
            docker compose --profile preprod up -d --no-build
            exit 1