name: CI/CD — Build & Deploy

# ─────────────────────────────────────────────────────────
# AKIŞ:
#   dev   (push + PR)  → CI (deploy yok, sadece doğrulama)
#   test  push         → CI → Docker push → TEST deploy
#   preprod push       → CI → Docker push → PRE-PROD deploy (onaylı)
# ─────────────────────────────────────────────────────────

on:
  push:
    branches:
      - Development
      - Test
      - Preprod
  pull_request:
    branches:
      - Development
      - Test
      - Preprod

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: emirklc/webshube
  DOTNET_VERSION: '8.0.x'

jobs:

  # ══════════════════════════════════════════════════════
  # 1. CI — Her push ve PR'da çalışır
  # ══════════════════════════════════════════════════════
  ci:
    name: CI — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: .NET kur
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Format check
        run: dotnet format MyApp.Web.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --logger trx --results-directory TestResults

      - name: Test sonuçlarını yükle
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_id }}
          path: TestResults/
          retention-days: 7

      - name: Güvenlik açığı taraması
        run: dotnet list package --vulnerable --include-transitive

  # ══════════════════════════════════════════════════════
  # 2. DOCKER — CI geçtikten sonra
  #    Sadece test ve preprod push'larında çalışır
  # ══════════════════════════════════════════════════════
  docker:
    name: Docker Build & Push
    needs: ci
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/Test' || github.ref == 'refs/heads/Preprod')
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      previous_tag: ${{ steps.meta.outputs.previous_tag }}
      env_name: ${{ steps.meta.outputs.env_name }}

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Docker Buildx kur
        uses: docker/setup-buildx-action@v3

      - name: GHCR'ye login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tag ve env belirle
        id: meta
        run: |
          if [ "${{ github.ref }}" = "refs/heads/Test" ]; then
            ENV_NAME="test"
          else
            ENV_NAME="preprod"
          fi

          echo "env_name=${ENV_NAME}" >> $GITHUB_OUTPUT
          echo "tag=${ENV_NAME}-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "previous_tag=${ENV_NAME}-previous" >> $GITHUB_OUTPUT

      - name: Önceki latest'i "previous" olarak etiketle (rollback için)
        continue-on-error: true
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.env_name }}-latest || exit 0
          docker tag \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.env_name }}-latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.previous_tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.previous_tag }}

      - name: Yeni image build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.env_name }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

  # ══════════════════════════════════════════════════════
  # 3. TEST DEPLOY — test branch
  # ══════════════════════════════════════════════════════
  deploy-test:
    name: Deploy → TEST
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/Test'
    environment:
      name: Test
      url: http://34.185.143.147:5001

    steps:
      - name: Sunucuya deploy et
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /app/webshube

            echo "→ Compose dosyasını güncelle"
            git fetch origin Test
            git reset --hard origin/Test

            echo "→ GHCR login"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u ${{ secrets.GHCR_USER }} --password-stdin

            echo "→ Image çek (tag: ${{ needs.docker.outputs.image_tag }})"
            IMAGE_TAG="${{ needs.docker.outputs.image_tag }}" \
              docker compose --profile test pull

            echo "→ Container yeniden başlat"
            IMAGE_TAG="${{ needs.docker.outputs.image_tag }}" \
              docker compose --profile test up -d --no-build

            echo "→ Healthcheck (max 60sn)"
            HEALTHY=0
            for i in {1..12}; do
              if curl -fs http://localhost:5001/health > /dev/null; then
                echo "✓ Sağlıklı"
                HEALTHY=1
                break
              fi
              echo "  [$i/12] bekleniyor..."
              sleep 5
            done

            if [ "$HEALTHY" = "1" ]; then
              docker image prune -f
              exit 0
            fi

            echo "✗ Healthcheck başarısız — önceki image'a rollback"
            IMAGE_TAG="${{ needs.docker.outputs.previous_tag }}" \
              docker compose --profile test pull
            IMAGE_TAG="${{ needs.docker.outputs.previous_tag }}" \
              docker compose --profile test up -d --no-build
            exit 1

  # ══════════════════════════════════════════════════════
  # 4. PRE-PROD DEPLOY — preprod branch
  #    GitHub Settings → Environments → preprod → Required reviewers
  # ══════════════════════════════════════════════════════
  deploy-preprod:
    name: Deploy → PRE-PROD
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/Preprod'
    environment:
      name: Preprod
      url: http://34.185.143.147:5002

    steps:
      - name: Sunucuya deploy et
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /app/webshube

            echo "→ Compose dosyasını güncelle"
            git fetch origin Preprod
            git reset --hard origin/Preprod

            echo "→ GHCR login"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u ${{ secrets.GHCR_USER }} --password-stdin

            echo "→ Image çek (tag: ${{ needs.docker.outputs.image_tag }})"
            IMAGE_TAG="${{ needs.docker.outputs.image_tag }}" \
              docker compose --profile preprod pull

            echo "→ Container yeniden başlat"
            IMAGE_TAG="${{ needs.docker.outputs.image_tag }}" \
              docker compose --profile preprod up -d --no-build

            echo "→ Healthcheck (max 60sn)"
            HEALTHY=0
            for i in {1..12}; do
              if curl -fs http://localhost:5002/health > /dev/null; then
                echo "✓ Sağlıklı"
                HEALTHY=1
                break
              fi
              echo "  [$i/12] bekleniyor..."
              sleep 5
            done

            if [ "$HEALTHY" = "1" ]; then
              docker image prune -f
              exit 0
            fi

            echo "✗ Healthcheck başarısız — önceki image'a rollback"
            IMAGE_TAG="${{ needs.docker.outputs.previous_tag }}" \
              docker compose --profile preprod pull
            IMAGE_TAG="${{ needs.docker.outputs.previous_tag }}" \
              docker compose --profile preprod up -d --no-build
            exit 1